<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-label="Winter lookbook board">
  <rect width="600" height="600" fill="#e9e6dd"/>
  <!-- registration marks -->
  <g stroke="#16140f" stroke-width="1" opacity="0.5">
    <g transform="translate(20,20)"><circle r="5" fill="none"/><line x1="-9" y1="0" x2="9" y2="0"/><line x1="0" y1="-9" x2="0" y2="9"/></g>
    <g transform="translate(580,20)"><circle r="5" fill="none"/><line x1="-9" y1="0" x2="9" y2="0"/><line x1="0" y1="-9" x2="0" y2="9"/></g>
    <g transform="translate(20,580)"><circle r="5" fill="none"/><line x1="-9" y1="0" x2="9" y2="0"/><line x1="0" y1="-9" x2="0" y2="9"/></g>
    <g transform="translate(580,580)"><circle r="5" fill="none"/><line x1="-9" y1="0" x2="9" y2="0"/><line x1="0" y1="-9" x2="0" y2="9"/></g>
  </g>
  <!-- garment plates, slightly tilted -->
  <g transform="translate(60,70) rotate(-2)">
    <rect width="200" height="250" fill="#6b675e"/>
    <path d="M40 30 L80 10 L120 10 L160 30 L150 90 L120 80 L120 230 L80 230 L80 80 L50 90 Z" fill="#3c3a34"/>
    <text x="100" y="246" font-family="monospace" font-size="11" fill="#f7f6f2" text-anchor="middle">(01) COAT</text>
  </g>
  <g transform="translate(330,90) rotate(1.5)">
    <rect width="200" height="240" fill="#cfc8b6"/>
    <path d="M50 40 L70 20 L130 20 L150 40 L150 200 L50 200 Z" fill="#b3a98f"/>
    <line x1="70" y1="60" x2="70" y2="190" stroke="#cfc8b6" stroke-width="3"/>
    <line x1="100" y1="60" x2="100" y2="190" stroke="#cfc8b6" stroke-width="3"/>
    <line x1="130" y1="60" x2="130" y2="190" stroke="#cfc8b6" stroke-width="3"/>
    <text x="100" y="226" font-family="monospace" font-size="11" fill="#16140f" text-anchor="middle">(02) KNIT</text>
  </g>
  <g transform="translate(80,350) rotate(1)">
    <rect width="180" height="210" fill="#4d4d4d"/>
    <rect x="50" y="20" width="35" height="170" fill="#3a3a3a"/>
    <rect x="95" y="20" width="35" height="170" fill="#3a3a3a"/>
    <text x="90" y="204" font-family="monospace" font-size="11" fill="#f7f6f2" text-anchor="middle">(03) FLANNEL</text>
  </g>
  <g transform="translate(340,360) rotate(-1.5)">
    <rect width="200" height="190" fill="#ed6a2c"/>
    <path d="M20 40 Q100 20 180 40 Q170 70 100 60 Q30 70 20 40 Z" fill="#d9531a"/>
    <text x="100" y="180" font-family="monospace" font-size="11" fill="#16140f" text-anchor="middle">(04) THE MISTAKE</text>
  </g>
</svg>
